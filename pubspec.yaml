name: babble_tower
description: A language learning app teaching English speakers to read Koine Greek through the four Gospels.
version: 1.0.0+7

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.4.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2

  # Utilities
  path_provider: ^2.1.1
  flutter_tts: ^4.2.5

  # Audio — quiz correct/incorrect sound effects (Phase: sound effects)
  audioplayers: ^6.0.0

  # Vocabulary CSV export — native share sheet
  share_plus: ^12.0.2

  # Backup restore — native file picker
  file_picker: ^10.3.9

  # Streak reminder notifications
  flutter_local_notifications: ^20.1.0
  timezone: ^0.10.1
  flutter_timezone: ^3.0.1

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/bible/el/
    - assets/dictionaries/
    - assets/sounds/
    - assets/morphology/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true